name: PR Notification

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Request review from NduProject
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: ["NduProject"]
              });
              console.log("Review requested from NduProject");
            } catch (e) {
              console.log("Could not request reviewer: " + e.message);
            }

      - name: Add review request comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const body = [
              "## Review Required",
              "",
              "@NduProject — This PR requires your review and approval before it can be merged.",
              "",
              "| Field | Value |",
              "|-------|-------|",
              "| PR Number | #" + pr.number + " |",
              "| Title | " + pr.title + " |",
              "| Author | @" + pr.user.login + " |",
              "| Branch | " + pr.head.ref + " -> " + pr.base.ref + " |",
              "| Changed files | " + pr.changed_files + " |",
              "| Additions | +" + pr.additions + " |",
              "| Deletions | -" + pr.deletions + " |",
              "",
              "**[Review this PR](" + pr.html_url + ")**",
              "",
              "---",
              "*To receive email notifications at chimmie@nduproject.com, verify that email in your [GitHub email settings](https://github.com/settings/emails).*"
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            console.log("Comment added to PR");
